<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Select your Fitness Hub membership plan. Experience premium training with real-time Supabase synchronization.">
    <title>Premium Membership | Fitness Hub</title>
    
    <!-- External Libraries -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-bg: #0a0a0c;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* Ambient Glow Effects */
        .ambient-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--accent-gradient);
            filter: blur(120px);
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        .container-premium {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* Header Branding */
        .brand-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease;
        }

        .brand-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
        }

        /* User Profile Ribbon */
        .profile-ribbon {
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .profile-item {
            display: flex;
            flex-direction: column;
        }

        .profile-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .profile-value {
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
        }

        /* Hero Text */
        .hero-section {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease;
        }

        .hero-section h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Plan Cards */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .plan-card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 45px 35px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .plan-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            transition: background 0.3s;
        }

        .plan-card:hover {
            transform: translateY(-20px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .plan-card.selected {
            border: 2px solid var(--accent-purple);
            background: rgba(139, 92, 246, 0.05);
        }

        .plan-card.selected::before {
            background: var(--accent-gradient);
        }

        .plan-card.active-plan {
            background: rgba(16, 185, 129, 0.05);
            border-color: rgba(16, 185, 129, 0.4);
            cursor: default;
        }

        .plan-card.active-plan:hover {
            transform: none;
        }

        .plan-icon {
            font-size: 3rem;
            margin-bottom: 25px;
            display: block;
        }

        .plan-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .plan-price-wrapper {
            margin-bottom: 30px;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .plan-price {
            font-size: 3rem;
            font-weight: 800;
            color: white;
        }

        .plan-currency {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .plan-period {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .features-list {
            list-style: none;
            margin-bottom: 40px;
            flex-grow: 1;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            color: #cbd5e1;
            font-size: 1rem;
        }

        .feature-item i {
            color: var(--accent-purple);
            font-size: 0.9rem;
        }

        /* Action Buttons */
        .cta-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            animation: fadeInUp 1s ease;
        }

        .btn-premium {
            padding: 18px 45px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .btn-proceed {
            background: var(--accent-gradient);
            color: white;
            border: none;
            box-shadow: 0 10px 40px rgba(139, 92, 246, 0.3);
        }

        .btn-proceed:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.5);
            color: white;
        }

        .btn-proceed:disabled {
            filter: grayscale(1);
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-return {
            background: transparent;
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-return:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: white;
            color: white;
        }

        /* Loading States */
        .shimmer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 2rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Ambient Position Helpers */
        .glow-tl { top: -10%; left: -10%; }
        .glow-br { bottom: -10%; right: -10%; }

        /* Animations */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .brand-section { flex-direction: column; gap: 30px; text-align: center; }
            .profile-ribbon { flex-direction: column; gap: 20px; width: 100%; }
            .hero-section h1 { font-size: 2.2rem; }
            .cta-section { flex-direction: column; }
            .btn-premium { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow glow-tl"></div>
    <div class="ambient-glow glow-br"></div>

    <div class="container-premium">
        <!-- Brand & Profile -->
        <header class="brand-section">
            <a href="../index.html" class="brand-logo">
                <i class="fas fa-dumbbell"></i>
                FITNESS HUB
            </a>
            <div class="profile-ribbon" id="userIdentity">
                <div class="profile-item">
                    <span class="profile-label">Member</span>
                    <span class="profile-value" id="displayName">Loading...</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">Email</span>
                    <span class="profile-value" id="displayEmail">Loading...</span>
                </div>
                <div class="profile-item">
                    <span class="profile-label">Status</span>
                    <span class="profile-value text-info" id="displayStatus">Syncing...</span>
                </div>
            </div>
        </header>

        <!-- Hero -->
        <section class="hero-section">
            <h1>Choose Your Level</h1>
            <p>Select a membership plan tailored to your fitness goals. Get instant access to world-class coaching and facilities.</p>
        </section>

        <!-- Dynamic Plans Grid -->
        <div class="plans-grid" id="membershipPlans">
            <!-- Populated by JS -->
        </div>

        <!-- Actions -->
        <div class="cta-section">
            <a href="dashboard.html" class="btn-premium btn-return">
                <i class="fas fa-arrow-left"></i>
                Back to Dashboard
            </a>
            <button class="btn-premium btn-proceed" id="proceedBtn" onclick="proceedToPayment()" disabled>
                Continue to Payment
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Shimmer Overlay -->
    <div class="shimmer-overlay" id="loadingOverlay">
        <div class="loader-ring"></div>
        <p class="loader-text">ESTABLISHING SECURE CONNECTION...</p>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/api-client.js"></script>
    <script src="../assets/js/membership.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Membership - Fitness Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container-membership {
            max-width: 1000px;
            width: 100%;
        }

        .membership-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .membership-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .membership-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .membership-plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .plan-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .plan-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .plan-card.selected {
            border: 3px solid #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
        }

        .plan-card.selected::before {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 15px;
            background: #667eea;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .plan-emoji {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .plan-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .plan-price {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }

        .plan-duration {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .plan-features {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .plan-features li {
            padding: 10px 0;
            color: #666;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95rem;
        }

        .plan-features li:last-child {
            border-bottom: none;
        }

        .plan-features li i {
            color: #667eea;
            margin-right: 10px;
            width: 20px;
        }

        .user-info-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .user-info-section h5 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .user-info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .info-label {
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-weight: 600;
            color: #333;
            margin-top: 5px;
        }

        .button-section {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn-select {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 13px 40px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .btn-select:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 13px 40px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .alert-info-custom {
            background: rgba(255, 255, 255, 0.95);
            border-left: 4px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
            font-size: 1.1rem;
        }

        .spinner-border {
            color: white;
        }

        @media (max-width: 768px) {
            .membership-header h1 {
                font-size: 1.8rem;
            }

            .membership-plans {
                grid-template-columns: 1fr;
            }

            .user-info-row {
                grid-template-columns: 1fr;
            }

            .button-section {
                flex-direction: column;
            }

            .btn-select, .btn-back {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Session Check -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('fitnesshub_session');
            if (!session) {
                window.location.href = '../pages/login.html';
            }
        });
    </script>

    <div class="container-membership">
        <!-- User Info Display -->
        <div class="user-info-section">
            <h5><i class="fas fa-user-circle"></i> Your Profile</h5>
            <div class="user-info-row">
                <div class="info-item">
                    <div class="info-label">Full Name</div>
                    <div class="info-value" id="displayName">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="displayEmail">-</div>
                </div>
            </div>
            <div class="user-info-row">
                <div class="info-item">
                    <div class="info-label">Phone</div>
                    <div class="info-value" id="displayPhone">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Age | Gender</div>
                    <div class="info-value" id="displayAgeGender">-</div>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="membership-header">
            <h1>💪 Choose Your Membership Plan</h1>
            <p>Select the perfect plan for your fitness journey</p>
        </div>

        <!-- Alert -->
        <div class="alert-info-custom">
            <i class="fas fa-info-circle"></i> <strong>Select a plan below</strong> and proceed to payment. You can upgrade or change your plan anytime.
        </div>

        <!-- Membership Plans -->
        <div class="membership-plans" id="membershipPlans">
            <!-- Plans will be loaded here by JavaScript -->
        </div>

        <!-- Button Section -->
        <div class="button-section">
            <a href="../pages/register.html" class="btn-back" onclick="logout(event)">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <button class="btn-select" id="proceedBtn" onclick="proceedToPayment()" disabled>
                <i class="fas fa-check-circle"></i> Proceed to Payment
            </button>
        </div>

        <!-- Loading State -->
        <div class="loading" id="loadingState">
            <div class="spinner-border spinner-border-lg mb-3" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p>Processing your selection...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/membership.js"></script>
</body>
</html>

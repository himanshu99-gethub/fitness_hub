<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Fitness Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link href="../assets/css/auth-style.css" rel="stylesheet">
    <style>
        .admin-login-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .admin-login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        
        .admin-login-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .admin-login-card p {
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-control {
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-admin-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            margin-top: 20px;
        }
        
        .btn-admin-login:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
        }
        
        .admin-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="text-center">
                <div class="admin-badge">
                    <i class="fas fa-shield-alt"></i> ADMIN PANEL
                </div>
                <h2><i class="fas fa-user-lock"></i> Admin Login</h2>
                <p>Access the management dashboard</p>
            </div>

            <form id="adminLoginForm">
                <div class="mb-3">
                    <label for="adminUsername" class="form-label">Username</label>
                    <input type="text" class="form-control" id="adminUsername" placeholder="Enter admin username" required>
                </div>

                <div class="mb-3">
                    <label for="adminPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="adminPassword" placeholder="Enter admin password" required>
                </div>

                <button type="button" class="btn btn-admin-login w-100 text-white" onclick="adminLogin()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>


            <hr>

            <div class="text-center">
                <a href="../index.html" class="text-decoration-none text-muted">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // Admin credentials database (will be checked against database)
        // Stored in localStorage for persistence
        const ADMIN_DB_KEY = 'fitnesshub_admins';
        const ADMIN_SESSION_KEY = 'fitnesshub_admin_session';

        function getAdminDatabase() {
            const stored = localStorage.getItem(ADMIN_DB_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    console.log('Error parsing admin database, using defaults');
                }
            }
            
            // Default admin admins
            return {
                'admin': {
                    password: 'admin123',
                    email: 'admin@fitnesshub.com',
                    fullName: 'Administrator',
                    createdAt: new Date().toISOString(),
                    isActive: true
                }
            };
        }

        function saveAdminDatabase(db) {
            localStorage.setItem(ADMIN_DB_KEY, JSON.stringify(db));
        }

        // Validate admin account exists and is active
        function isAdminValid(username) {
            const admins = getAdminDatabase();
            const admin = admins[username];
            
            if (!admin) {
                console.log('❌ Admin not found:', username);
                return false;
            }
            
            if (admin.isActive === false) {
                console.log('❌ Admin account inactive:', username);
                return false;
            }
            
            return true;
        }

        function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;

            if (!username || !password) {
                alert('❌ Please enter both username and password!');
                return;
            }

            // Get admin database
            const admins = getAdminDatabase();
            const adminData = admins[username];
            
            if (!adminData) {
                alert('❌ Admin user not found!');
                console.log('Available admins:', Object.keys(admins));
                return;
            }

            // Check if admin is active
            if (adminData.isActive === false) {
                alert('❌ This admin account has been deleted!');
                return;
            }

            // Verify password
            if (adminData.password !== password) {
                alert('❌ Invalid password!');
                return;
            }

            // Admin verified - create session
            const adminSession = {
                username: username,
                email: adminData.email,
                fullName: adminData.fullName,
                loginTime: new Date().toISOString(),
                role: 'admin',
                isAuthenticated: true,
                sessionId: 'admin_' + Date.now() // Add session ID for validation
            };

            localStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify(adminSession));
            console.log('✅ Admin logged in:', username);
            window.location.href = 'admin-dashboard.html';
        }

        // Check if admin already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem(ADMIN_SESSION_KEY);
            if (session) {
                try {
                    const adminSession = JSON.parse(session);
                    
                    if (adminSession.isAuthenticated) {
                        console.log('✅ Admin session found, redirecting to dashboard');
                        window.location.href = 'admin-dashboard.html';
                    }
                } catch (e) {
                    console.log('Invalid session:', e);
                    localStorage.removeItem(ADMIN_SESSION_KEY);
                }
            }
        });

        // Press Enter to login
        document.getElementById('adminLoginForm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                adminLogin();
            }
        });
    </script>
</body>
</html>
